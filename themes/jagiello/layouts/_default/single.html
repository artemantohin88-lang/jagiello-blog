{{ define "main" }}
<article>
  <div class="wrap">
    <div class="art-hero">
      <div class="crumb">
        <a href="{{ "posts/" | absURL }}">← Все статьи</a>
      </div>
      <div class="art-meta">
        <span class="card-tag">{{ .Params.category }}</span>
        <span class="art-date">{{ .Date.Format "2 Jan 2006" }}</span>
        <span class="art-read">{{ .Params.readtime }}</span>
      </div>
      <h1 class="art-title">{{ .Title }}</h1>
      <p class="art-desc">{{ .Description }}</p>
    </div>

    <div class="art-body">
      {{ .Content }}
    </div>

    <div class="art-footer">
      <div class="art-tags">
        {{ range .Params.tags }}<span class="pill">{{ . }}</span>{{ end }}
      </div>
      <a href="/posts" class="art-back">← Все статьи</a>
    </div>
  </div>
</article>

<style>
.art-hero { padding: 64px 0 48px; border-bottom: 1px solid var(--border); margin-bottom: 48px; }
.crumb { font-size: 13px; color: var(--t3); margin-bottom: 24px; }
.crumb a { color: var(--t2); transition: color .15s; }
.crumb a:hover { color: var(--text); }
.art-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.card-tag { font-size: 11px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--t3); background: var(--s2); padding: 3px 9px; border-radius: 4px; }
.art-date, .art-read { font-size: 13px; color: var(--t3); }
.art-title { font-family: 'Instrument Serif', serif; font-size: clamp(32px, 4.5vw, 56px); font-weight: 400; line-height: 1.1; letter-spacing: -.025em; margin-bottom: 20px; }
.art-desc { font-size: 18px; color: var(--t2); line-height: 1.65; max-width: 680px; }
.art-body { max-width: 720px; margin: 0 auto 64px; font-size: 16px; line-height: 1.8; color: var(--t2); }
.art-body h2 { font-family: 'Instrument Serif', serif; font-size: 28px; font-weight: 400; color: var(--text); margin: 48px 0 16px; letter-spacing: -.01em; }
.art-body h3 { font-size: 18px; font-weight: 600; color: var(--text); margin: 32px 0 12px; }
.art-body p { margin-bottom: 20px; }
.art-body ul, .art-body ol { margin: 0 0 20px 24px; }
.art-body li { margin-bottom: 8px; }
.art-body strong { color: var(--text); font-weight: 600; }
.art-body blockquote { border-left: 3px solid var(--green); padding-left: 20px; margin: 32px 0; font-style: italic; color: var(--t2); }
.art-body hr { border: none; border-top: 1px solid var(--border); margin: 40px 0; }
.art-footer { display: flex; align-items: center; justify-content: space-between; padding: 32px 0; border-top: 1px solid var(--border); flex-wrap: wrap; gap: 16px; }
.art-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.pill { font-size: 12px; color: var(--t3); background: var(--s2); padding: 4px 10px; border-radius: 4px; }
.art-back { font-size: 14px; color: var(--t2); transition: color .15s; }
.art-back:hover { color: var(--text); }
</style>
{{ end }}
