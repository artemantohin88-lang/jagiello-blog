{{ define "main" }}
<article>
  <div class="wrap">
    <div class="art-hero">
      <div class="crumb">
        <a href="/blog/posts/">← Все статьи</a>
      </div>
      <div class="art-meta">
        <span class="card-tag">{{ .Params.category }}</span>
        <span class="art-date">{{ .Date.Format "2 Jan 2006" }}</span>
        <span class="art-read">{{ .Params.readtime }}</span>
      </div>
      <h1 class="art-title">{{ .Title }}</h1>
      <p class="art-desc">{{ .Description }}</p>
    </div>

    <div class="art-body">
      {{ .Content }}
    </div>

    <div class="art-footer">
      <div class="art-tags">
        {{ range .Params.tags }}<span class="pill">{{ . }}</span>{{ end }}
      </div>
      <a href="/blog/posts/">← Все статьи</a>
    </div>
  </div>
</article>

<style>
/* ── Герой ── */
.art-hero { max-width: 720px; margin: 0 auto; padding: 64px 0 48px; border-bottom: 1px solid var(--border); }
.crumb { font-size: 13px; color: var(--t3); margin-bottom: 24px; }
.crumb a { color: var(--t2); transition: color .15s; }
.crumb a:hover { color: var(--text); }
.art-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.card-tag { font-size: 11px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--t3); background: var(--s2); padding: 3px 9px; border-radius: 4px; }
.art-date, .art-read { font-size: 13px; color: var(--t3); }
.art-title { font-family: 'Instrument Serif', serif; font-size: clamp(32px, 4.5vw, 52px); font-weight: 400; line-height: 1.1; letter-spacing: -.025em; margin-bottom: 20px; }
.art-desc { font-size: 17px; color: var(--t2); line-height: 1.65; }

/* ── Тело статьи ── */
.art-body { max-width: 720px; margin: 48px auto 64px; font-size: 16px; line-height: 1.8; color: var(--t2); }
.art-body h2 { font-family: 'Instrument Serif', serif; font-size: 28px; font-weight: 400; color: var(--text); margin: 56px 0 16px; letter-spacing: -.01em; }
.art-body h3 { font-size: 17px; font-weight: 600; color: var(--text); margin: 36px 0 12px; }
.art-body p { margin-bottom: 20px; }
.art-body ul, .art-body ol { margin: 0 0 20px 24px; }
.art-body li { margin-bottom: 8px; }
.art-body strong { color: var(--text); font-weight: 600; }
.art-body blockquote { border-left: 3px solid var(--green); padding-left: 20px; margin: 32px 0; font-style: italic; color: var(--t2); }
.art-body hr { border: none; border-top: 1px solid var(--border); margin: 48px 0; }

/* ── Обложка ── */
.art-body img { max-width: 100%; height: auto; border-radius: 8px; display: block; margin: 0 0 48px; }

/* ── Цифровой блок (одна большая цифра) ── */
.stat-block { background: var(--green); color: #fff; border-radius: 8px; padding: 32px 36px; margin: 40px 0; }
.stat-block .stat-num { font-family: 'Instrument Serif', serif; font-size: 56px; line-height: 1; font-weight: 400; letter-spacing: -.03em; margin-bottom: 8px; }
.stat-block .stat-label { font-size: 15px; opacity: .8; line-height: 1.5; }

/* ── Сетка цифр (несколько метрик в ряд) ── */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 2px; margin: 40px 0; border-radius: 8px; overflow: hidden; }
.stat-grid .stat-cell { background: var(--s2); padding: 24px 20px; }
.stat-grid .stat-cell .num { font-family: 'Instrument Serif', serif; font-size: 36px; font-weight: 400; color: var(--green); line-height: 1; margin-bottom: 6px; letter-spacing: -.02em; }
.stat-grid .stat-cell .lbl { font-size: 13px; color: var(--t2); line-height: 1.4; }

/* ── Врезка (инсайт/акцент) ── */
.insight { border-left: 3px solid var(--green); background: var(--gbg); padding: 20px 24px; margin: 36px 0; border-radius: 0 6px 6px 0; }
.insight p { margin: 0; font-size: 15px; color: var(--text); line-height: 1.7; }

/* ── Предупреждение / важное ── */
.callout { background: var(--s2); border-radius: 8px; padding: 20px 24px; margin: 36px 0; }
.callout p { margin: 0; font-size: 15px; color: var(--t2); line-height: 1.7; }
.callout strong { color: var(--text); }

/* ── Таблица стека ── */
.stack-table { width: 100%; border-collapse: collapse; margin: 32px 0; font-size: 15px; }
.stack-table th { text-align: left; font-weight: 600; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; color: var(--t3); padding: 0 12px 12px 0; border-bottom: 1px solid var(--border); }
.stack-table td { padding: 14px 12px 14px 0; border-bottom: 1px solid var(--border); color: var(--t2); vertical-align: top; }
.stack-table td:first-child { color: var(--text); font-weight: 500; }

/* ── Футер ── */
.art-footer { max-width: 720px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 32px 0; border-top: 1px solid var(--border); flex-wrap: wrap; gap: 16px; }
.art-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.pill { font-size: 12px; color: var(--t3); background: var(--s2); padding: 4px 10px; border-radius: 4px; }
</style>
{{ end }}
