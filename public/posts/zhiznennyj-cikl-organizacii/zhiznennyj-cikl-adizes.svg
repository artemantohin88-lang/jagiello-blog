<svg width="100%" viewBox="0 0 720 340" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Жизненный цикл организации — четыре состояния и три перехода</title>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#a8a29a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <linearGradient id="curve-grad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#1a5c36;stop-opacity:1"/>
    <stop offset="60%" style="stop-color:#2d8a55;stop-opacity:1"/>
    <stop offset="100%" style="stop-color:#a8a29a;stop-opacity:1"/>
  </linearGradient>
  <linearGradient id="fill-grad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#1a5c36;stop-opacity:0.08"/>
    <stop offset="100%" style="stop-color:#1a5c36;stop-opacity:0"/>
  </linearGradient>
</defs>

<!-- Фон -->
<rect width="720" height="340" fill="#f8f6f2" rx="12"/>

<!-- Сетка -->
<line x1="60" y1="40" x2="60" y2="280" stroke="#e6e1d9" stroke-width="1"/>
<line x1="60" y1="280" x2="640" y2="280" stroke="#e6e1d9" stroke-width="1" marker-end="url(#arr)"/>
<line x1="60" y1="40" x2="60" y2="32" stroke="#e6e1d9" stroke-width="1" marker-end="url(#arr)"/>

<!-- Подписи осей -->
<text x="54" y="28" text-anchor="middle" font-family="Instrument Sans, sans-serif" font-size="10" fill="#a8a29a" letter-spacing=".08em" text-transform="uppercase">РОСТ</text>
<text x="645" y="284" font-family="Instrument Sans, sans-serif" font-size="10" fill="#a8a29a" letter-spacing=".08em">ВРЕМЯ</text>

<!-- Зоны фаз — вертикальные полосы -->
<rect x="61" y="40" width="138" height="240" fill="#1a5c36" fill-opacity="0.03"/>
<rect x="199" y="40" width="138" height="240" fill="#1a5c36" fill-opacity="0.02"/>
<rect x="337" y="40" width="138" height="240" fill="#18160f" fill-opacity="0.02"/>
<rect x="475" y="40" width="165" height="240" fill="#a8a29a" fill-opacity="0.04"/>

<!-- Вертикальные разделители фаз -->
<line x1="199" y1="50" x2="199" y2="280" stroke="#e6e1d9" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="337" y1="50" x2="337" y2="280" stroke="#e6e1d9" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="475" y1="50" x2="475" y2="280" stroke="#e6e1d9" stroke-width="1" stroke-dasharray="4 3"/>

<!-- Заливка под кривой -->
<path d="M60 260 C100 250 140 220 199 180 C258 140 290 110 337 95 C384 80 420 85 475 90 C510 93 540 140 600 200 L640 280 L60 280 Z" fill="url(#fill-grad)"/>

<!-- Основная кривая роста -->
<path d="M60 260 C100 250 140 220 199 180 C258 140 290 110 337 95 C384 80 420 85 475 90 C510 93 540 140 600 200" fill="none" stroke="url(#curve-grad)" stroke-width="2.5" stroke-linecap="round"/>

<!-- Точки переходов -->
<!-- Переход 1 -->
<circle cx="199" cy="180" r="6" fill="#fff" stroke="#1a5c36" stroke-width="2"/>
<line x1="199" y1="174" x2="199" y2="130" stroke="#1a5c36" stroke-width="1" stroke-dasharray="3 2"/>
<rect x="155" y="110" width="88" height="22" rx="4" fill="#18160f"/>
<text x="199" y="125" text-anchor="middle" font-family="Instrument Sans, sans-serif" font-size="10" font-weight="600" fill="#fff" letter-spacing=".04em">ПЕРЕХОД 1</text>

<!-- Переход 2 -->
<circle cx="337" cy="95" r="6" fill="#fff" stroke="#1a5c36" stroke-width="2"/>
<line x1="337" y1="89" x2="337" y2="60" stroke="#1a5c36" stroke-width="1" stroke-dasharray="3 2"/>
<rect x="293" y="44" width="88" height="22" rx="4" fill="#18160f"/>
<text x="337" y="59" text-anchor="middle" font-family="Instrument Sans, sans-serif" font-size="10" font-weight="600" fill="#fff" letter-spacing=".04em">ПЕРЕХОД 2</text>

<!-- Переход 3 -->
<circle cx="475" cy="90" r="6" fill="#fff" stroke="#a8a29a" stroke-width="2"/>
<line x1="475" y1="84" x2="475" y2="60" stroke="#a8a29a" stroke-width="1" stroke-dasharray="3 2"/>
<rect x="431" y="44" width="88" height="22" rx="4" fill="#18160f"/>
<text x="475" y="59" text-anchor="middle" font-family="Instrument Sans, sans-serif" font-size="10" font-weight="600" fill="#fff" letter-spacing=".04em">ПЕРЕХОД 3</text>

<!-- Метки фаз снизу -->
<!-- Фаза 1 -->
<text x="130" y="300" text-anchor="middle" font-family="Instrument Serif, serif" font-size="13" font-weight="400" fill="#18160f">Личный</text>
<text x="130" y="315" text-anchor="middle" font-family="Instrument Serif, serif" font-size="13" font-weight="400" fill="#18160f">контроль</text>
<text x="130" y="328" text-anchor="middle" font-family="Instrument Sans, sans-serif" font-size="10" fill="#a8a29a">01</text>

<!-- Фаза 2 -->
<text x="268" y="300" text-anchor="middle" font-family="Instrument Serif, serif" font-size="13" font-weight="400" fill="#18160f">Управление</text>
<text x="268" y="315" text-anchor="middle" font-family="Instrument Serif, serif" font-size="13" font-weight="400" fill="#18160f">через людей</text>
<text x="268" y="328" text-anchor="middle" font-family="Instrument Sans, sans-serif" font-size="10" fill="#a8a29a">02</text>

<!-- Фаза 3 -->
<text x="406" y="300" text-anchor="middle" font-family="Instrument Serif, serif" font-size="13" font-weight="400" fill="#18160f">Управление</text>
<text x="406" y="315" text-anchor="middle" font-family="Instrument Serif, serif" font-size="13" font-weight="400" fill="#18160f">через процессы</text>
<text x="406" y="328" text-anchor="middle" font-family="Instrument Sans, sans-serif" font-size="10" fill="#a8a29a">03</text>

<!-- Фаза 4 - развилка -->
<text x="558" y="300" text-anchor="middle" font-family="Instrument Serif, serif" font-size="13" font-weight="400" fill="#68635a">Точка</text>
<text x="558" y="315" text-anchor="middle" font-family="Instrument Serif, serif" font-size="13" font-weight="400" fill="#68635a">выбора</text>
<text x="558" y="328" text-anchor="middle" font-family="Instrument Sans, sans-serif" font-size="10" fill="#a8a29a">04</text>

<!-- Стрелка вверх (обновление) -->
<path d="M600 200 C620 170 630 130 625 90" fill="none" stroke="#1a5c36" stroke-width="1.5" stroke-dasharray="5 3" stroke-linecap="round" marker-end="url(#arr)"/>
<text x="638" y="95" font-family="Instrument Sans, sans-serif" font-size="9" fill="#1a5c36" font-weight="500">↑ рост</text>

<!-- Стрелка вниз (спад) -->
<path d="M600 200 C615 220 625 245 630 265" fill="none" stroke="#8b1a1a" stroke-width="1.5" stroke-dasharray="5 3" stroke-linecap="round" marker-end="url(#arr)"/>
<text x="633" y="260" font-family="Instrument Sans, sans-serif" font-size="9" fill="#8b1a1a" font-weight="500">↓ спад</text>

</svg>
