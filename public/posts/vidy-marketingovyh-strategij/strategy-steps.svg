<svg width="100%" viewBox="0 0 680 170" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Пять этапов разработки маркетинговой стратегии</title>
<style>
  text { font-family: 'Instrument Sans', sans-serif; }
  .serif { font-family: 'Instrument Serif', serif; }
</style>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#a8a29a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="10" y="16" width="108" height="96" rx="10" fill="#18160f"/>
<text x="22" y="38" font-size="10" font-weight="600" letter-spacing=".12em" fill="rgba(248,246,242,.3)">01</text>
<text class="serif" x="64" y="72" text-anchor="middle" dominant-baseline="central" font-size="18" fill="#fff">Аудит</text>
<text x="64" y="96" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgba(248,246,242,.4)">ситуации</text>
<line x1="120" y1="64" x2="130" y2="64" stroke="#a8a29a" stroke-width="1" marker-end="url(#a)"/>

<rect x="132" y="16" width="108" height="96" rx="10" fill="#fff" stroke="#e6e1d9" stroke-width="0.5"/>
<rect x="132" y="16" width="108" height="3" rx="10" fill="#1d3a5f"/>
<text x="144" y="38" font-size="10" font-weight="600" letter-spacing=".12em" fill="#a8a29a">02</text>
<text class="serif" x="186" y="72" text-anchor="middle" dominant-baseline="central" font-size="18" fill="#18160f">Цель</text>
<text x="186" y="96" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#a8a29a">в деньгах</text>
<line x1="242" y1="64" x2="252" y2="64" stroke="#a8a29a" stroke-width="1" marker-end="url(#a)"/>

<rect x="254" y="16" width="108" height="96" rx="10" fill="#fff" stroke="#e6e1d9" stroke-width="0.5"/>
<rect x="254" y="16" width="108" height="3" rx="10" fill="#92520c"/>
<text x="266" y="38" font-size="10" font-weight="600" letter-spacing=".12em" fill="#a8a29a">03</text>
<text class="serif" x="308" y="68" text-anchor="middle" dominant-baseline="central" font-size="18" fill="#18160f">Сегменты</text>
<text x="308" y="96" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#a8a29a">и позиция</text>
<line x1="364" y1="64" x2="374" y2="64" stroke="#a8a29a" stroke-width="1" marker-end="url(#a)"/>

<rect x="376" y="16" width="108" height="96" rx="10" fill="#fff" stroke="#e6e1d9" stroke-width="0.5"/>
<rect x="376" y="16" width="108" height="3" rx="10" fill="#18160f"/>
<text x="388" y="38" font-size="10" font-weight="600" letter-spacing=".12em" fill="#a8a29a">04</text>
<text class="serif" x="430" y="72" text-anchor="middle" dominant-baseline="central" font-size="18" fill="#18160f">Каналы</text>
<text x="430" y="96" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#a8a29a">и действия</text>
<line x1="486" y1="64" x2="496" y2="64" stroke="#a8a29a" stroke-width="1" marker-end="url(#a)"/>

<rect x="498" y="16" width="170" height="96" rx="10" fill="#eaf2ed" stroke="#1a5c36" stroke-width="0.5"/>
<rect x="498" y="16" width="170" height="3" rx="10" fill="#1a5c36"/>
<text x="510" y="38" font-size="10" font-weight="600" letter-spacing=".12em" fill="#1a5c36" fill-opacity=".5">05</text>
<text class="serif" x="583" y="72" text-anchor="middle" dominant-baseline="central" font-size="18" fill="#1a5c36">Метрики</text>
<text x="583" y="96" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#1a5c36" fill-opacity=".7">и контроль</text>

<text x="340" y="150" text-anchor="middle" font-size="11" fill="#a8a29a">Пропуск любого этапа — стратегия остаётся на бумаге</text>
</svg>
